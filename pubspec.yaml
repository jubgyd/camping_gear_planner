name: camp_gear_planner
description: "Offline companion app for planning camping trips — gear checklists, packing weight, and a shopping list."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1   # state management
  uuid: ^4.4.0               # stable UUID ids (see GDD §13)
  shared_preferences: ^2.3.0 # cross-platform persistence (web/desktop/mobile)
  path_provider: ^2.1.3      # locate app documents dir for file-based JSON (alt repo)
  file_picker: ^8.0.0        # desktop export/import file dialog (GDD §12)
  share_plus: ^9.0.0         # mobile export flow (GDD §12)
  url_launcher: ^6.3.0       # open item links in browser (GDD §5.6)
  intl: ^0.19.0              # date formatting
  collection: ^1.18.0        # firstOrNull and friends
  http: ^1.2.0               # fetch product pages for price lookup (GDD §5.6)
  html: ^0.15.4              # parse fetched HTML for og:price / schema.org price
  google_fonts: ^6.2.1       # Fraunces / Inter / JetBrains Mono

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1  # generates the Windows .ico app icon from the PNG

flutter:
  uses-material-design: true
  assets:
    - assets/i18n/
    - assets/icon/

# App-icon generation: run `dart run flutter_launcher_icons` after changing the
# source PNG to regenerate windows/runner/resources/app_icon.ico.
flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    icon_size: 256
